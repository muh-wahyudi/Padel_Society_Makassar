<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Society Makassar - Login</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&amp;family=Poppins:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Global CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .login-body {
            background: linear-gradient(135deg, #0a4c7a 0%, #1a6b9f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 1rem;
        }
        
        .login-container {
            max-width: 420px;
            width: 100%;
        }
        
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-header .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #0a4c7a;
            margin-bottom: 1rem;
        }
        
        .login-header .logo span {
            font-weight: 300;
            color: #1e2b37;
        }
        
        .login-header h1 {
            font-size: 1.8rem;
            color: #1e2b37;
            margin-bottom: 0.3rem;
        }
        
        .login-header p {
            color: #5f6c7a;
            font-size: 0.95rem;
        }
        
        /* FORM LOGIN */
        .login-form .form-group {
            margin-bottom: 1.5rem;
        }
        
        .login-form label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #1e2b37;
            font-size: 0.95rem;
        }
        
        .login-form label i {
            color: #0a4c7a;
            margin-right: 0.5rem;
            width: 20px;
        }
        
        .login-form .form-control {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            background: #f8fafc;
            box-sizing: border-box;
        }
        
        .login-form .form-control:focus {
            outline: none;
            border-color: #0a4c7a;
            background: white;
            box-shadow: 0 0 0 3px rgba(10,76,122,0.1);
        }
        
        .login-form select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230a4c7a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1rem;
        }
        
        .demo-accounts {
            background: #e2f0fa;
            padding: 1.2rem;
            border-radius: 16px;
            margin: 1.5rem 0;
            font-size: 0.9rem;
            border-left: 4px solid #0a4c7a;
        }
        
        .demo-accounts p {
            margin-bottom: 0.3rem;
            color: #0a4c7a;
        }
        
        .demo-accounts p:first-child {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .login-btn {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.1rem;
            background: #0a4c7a;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1rem;
            text-decoration: none;
        }
        
        .login-btn:hover {
            background: #083b5e;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(10,76,122,0.3);
        }
        
        .register-links {
            margin-top: 2rem;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.5rem;
        }
        
        .register-links p {
            color: #5f6c7a;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        
        .register-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        
        .register-btn {
            flex: 1;
            padding: 0.3rem;
            border-radius: 60px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        
        .register-btn.customer {
            background: #e2f0fa;
            color: #0a4c7a;
            border: 1px solid #b8d3e8;
        }
        
        .register-btn.customer:hover {
            background: #0a4c7a;
            color: white;
            transform: translateY(-2px);
        }
        
        .register-btn.owner {
            background: #fff3e0;
            color: #f39c12;
            border: 1px solid #ffe0b2;
        }
        
        .register-btn.owner:hover {
            background: #f39c12;
            color: white;
            transform: translateY(-2px);
        }
        
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .login-footer a {
            color: #5f6c7a;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .login-footer a:hover {
            color: #0a4c7a;
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
            }
            
            .register-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">Padel<span> Society</span></div>
                <h1>Login</h1>
                <p>Masuk ke akun Anda</p>
            </div>
            
            <form class="login-form" action="index.html" method="get">
                <div class="form-group">
                    <label for="loginEmail">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="loginEmail" name="email" class="form-control" placeholder="customer@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="loginPassword" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <div class="form-group">
                    <label for="loginRole">
                        <i class="fas fa-user-tag"></i>
                        Login Sebagai
                    </label>
                    <select id="loginRole" name="role" class="form-control">
                        <option value="customer">Customer</option>
                        <option value="owner">Owner</option>
                    </select>
                </div>
                
                <a href="my-booking.html" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
            </form>
            
            <div class="register-links">
                <p>Belum punya akun?</p>
                <div class="register-buttons">
                    <a href="register-customer.html" class="register-btn customer">
                        <i class="fas fa-user"></i> Register Customer
                    </a>
                    <a href="owner-register.html" class="register-btn owner">
                        <i class="fas fa-store"></i> Register Owner
                    </a>
                </div>
            </div>
            
            <div class="login-footer">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Kembali ke Home</a>
            </div>
        </div>
    </div>
</body>
</html>
